<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TX 游戏活动助手</title>
  <link href="https://fonts.loli.net/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0e0e;
      --surface: #131313;
      --surface-high: #2a2a2a;
      --surface-highest: #353534;
      --surface-bright: #393939;
      --on-surface: #e5e2e1;
      --on-surface-var: #b9cacb;
      --outline: #849495;
      --primary: #00f2ff;
      --on-primary: #002022;
      --secondary: #e9b3ff;
      --secondary-ctn: #7d01b1;
      --error: #ffb4ab;
      --success: #74f5ff;
      --card-bg: rgba(30,30,30,0.6);
      --card-bg-h: rgba(45,45,45,0.7);
      --r: 6px;
    }

    body {
      font-family: SimHei, 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--on-surface);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface-bright); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--outline); }

    /* ---- Material Icon ---- */
    .mi {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      line-height: 1;
      display: inline-block;
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 1;
    }

    /* ==================== Custom Titlebar ==================== */
    .titlebar {
      height: 32px;
      background: var(--bg);
      display: flex;
      align-items: center;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }
    .titlebar-title {
      flex: 1;
      padding-left: 14px;
      font-size: 12px;
      color: var(--on-surface-var);
      letter-spacing: 0.02em;
    }
    .titlebar-btns {
      display: flex;
      -webkit-app-region: no-drag;
    }
    .tb-btn {
      width: 46px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--on-surface-var);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.08); }
    .tb-btn.close:hover { background: #e81123; color: #fff; }
    .tb-btn .mi { font-size: 18px; font-variation-settings: 'FILL' 0, 'wght' 300; }

    /* ==================== Header ==================== */
    header {
      padding: 20px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 16px;
      background: var(--surface);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }
    .header-title {
      font-family: SimHei, 'Microsoft YaHei', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--on-surface);
      white-space: nowrap;
    }
    .header-badge {
      font-family: SimHei, 'Microsoft YaHei', sans-serif;
      font-size: 10px;
      color: var(--primary);
      border: 1px solid rgba(0,242,255,0.3);
      padding: 2px 8px;
      border-radius: 2px;
      white-space: nowrap;
    }
    .header-status {
      font-size: 12px;
      color: var(--on-surface-var);
      white-space: nowrap;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ==================== Unified Buttons ==================== */
    .btn {
      font-family: SimHei, 'Microsoft YaHei', sans-serif;
      padding: 7px 16px;
      border-radius: var(--r);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: none;
      white-space: nowrap;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .btn .mi { font-size: 16px; }

    /* Primary: cyan fill */
    .btn-cyan {
      background: var(--primary);
      color: var(--on-primary);
    }
    .btn-cyan:hover:not(:disabled) {
      box-shadow: 0 0 14px rgba(0,242,255,0.6);
    }

    /* Ghost: transparent with border */
    .btn-ghost {
      background: rgba(255,255,255,0.04);
      color: var(--on-surface-var);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .btn-ghost:hover:not(:disabled) {
      background: rgba(255,255,255,0.08);
      color: var(--on-surface);
    }

    /* Large run-all */
    .btn-lg {
      padding: 9px 24px;
      font-size: 15px;
      font-weight: 700;
    }

    /* ==================== Card Grid ==================== */
    #events {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      align-content: start;
      background: var(--surface);
    }

    /* ---- Glass Card ---- */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--r);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      animation: fadeUp 0.3s ease;
      position: relative;
    }
    .glass-card:hover {
      background: var(--card-bg-h);
      border-color: rgba(0,242,255,0.3);
      box-shadow: 0 0 16px rgba(0,242,255,0.08);
    }
    .glass-card.expired { opacity: 0.5; }
    .glass-card.expired:hover { opacity: 0.65; }

    .card-inner {
      padding: 16px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Card Top: Status + Title */
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .card-title {
      font-family: SimHei, 'Microsoft YaHei', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--on-surface);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.active { background: var(--primary); box-shadow: 0 0 6px var(--primary); }
    .status-dot.expired { background: var(--on-surface-var); opacity: 0.4; }
    .status-label {
      font-size: 11px;
      color: var(--on-surface-var);
    }
    .status-label.active { color: var(--primary); }

    /* Card Date */
    .card-date {
      font-family: SimHei, 'Microsoft YaHei', sans-serif;
      font-size: 12px;
      color: var(--primary);
      margin-bottom: 4px;
    }

    /* Card Subtitle */
    .card-subtitle {
      font-size: 12px;
      color: var(--on-surface-var);
      margin-bottom: 10px;
    }

    /* Info Box */
    .info-box {
      background: rgba(0,0,0,0.2);
      border-radius: var(--r);
      padding: 10px 12px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .info-box-label {
      font-size: 10px;
      color: var(--on-surface-var);
      margin-bottom: 3px;
      letter-spacing: 0.04em;
    }
    .info-box-content {
      font-size: 12px;
      color: var(--on-surface);
      line-height: 1.6;
    }
    .glass-card.expired .info-box-content {
      color: var(--on-surface-var);
      text-decoration: line-through;
      font-style: italic;
    }

    /* Card Actions */
    .card-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: auto;
    }
    .card-btn {
      font-family: SimHei, 'Microsoft YaHei', sans-serif;
      border: none;
      border-radius: var(--r);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .card-btn:active:not(:disabled) { transform: scale(0.96); }
    .card-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .card-btn .mi { font-size: 16px; }

    .card-btn-run {
      background: var(--primary);
      color: var(--on-primary);
      flex: 1;
      padding: 8px 0;
    }
    .card-btn-run:hover:not(:disabled) {
      box-shadow: 0 0 12px rgba(0,242,255,0.7);
    }

    .card-btn-retry {
      border: 1px solid var(--secondary);
      color: var(--secondary);
      background: transparent;
      flex: 1;
      padding: 8px 0;
    }
    .card-btn-retry:hover:not(:disabled) {
      background: rgba(233,179,255,0.1);
      box-shadow: 0 0 8px rgba(233,179,255,0.3);
    }

    .card-btn-sm {
      background: transparent;
      color: var(--on-surface-var);
      border: 1px solid rgba(255,255,255,0.08);
      width: 34px; height: 34px;
      flex-shrink: 0;
      padding: 0;
    }
    .card-btn-sm:hover:not(:disabled) {
      color: var(--on-surface);
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
    }
    .card-btn-sm.danger:hover:not(:disabled) {
      color: var(--error);
      border-color: rgba(255,180,171,0.3);
      background: rgba(255,180,171,0.06);
    }

    /* ---- Progress Bar ---- */
    .progress-track {
      height: 3px;
      background: rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00f2ff, #7d01b1);
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .progress-fill.dim { opacity: 0.3; }

    /* ---- Empty ---- */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--on-surface-var);
    }
    .empty .icon { font-size: 48px; margin-bottom: 14px; opacity: 0.4; }
    .empty p { margin-top: 6px; font-size: 13px; }

    /* ==================== Log Panel ==================== */
    #log-panel {
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.05);
      background: rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      height: 36px;
      transition: height 0.3s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }
    #log-panel.expanded { height: 280px; }
    .log-header {
      display: flex;
      align-items: center;
      padding: 8px 28px;
      cursor: pointer;
      gap: 10px;
      flex-shrink: 0;
    }
    .log-header:hover { background: rgba(255,255,255,0.02); }
    .log-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 6px var(--primary);
      flex-shrink: 0;
    }
    .log-label {
      font-family: SimHei, 'Microsoft YaHei', sans-serif;
      font-size: 12px;
      color: var(--on-surface);
    }
    .log-sep {
      width: 1px; height: 14px;
      background: rgba(255,255,255,0.1);
    }
    .log-meta {
      font-size: 11px;
      color: var(--on-surface-var);
    }
    .log-spacer { flex: 1; }
    .log-link {
      font-size: 12px;
      color: var(--on-surface-var);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 2px;
      transition: color 0.15s;
      font-family: inherit;
    }
    .log-link:hover { color: var(--primary); }
    .log-link.danger:hover { color: var(--error); }
    .log-toggle {
      color: var(--on-surface-var);
      font-size: 10px;
    }
    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 4px 28px 10px;
      font-size: 12px;
      line-height: 1.8;
      color: var(--on-surface-var);
    }
    .log-line { padding: 1px 0; }
    .log-line.ok  { color: var(--success); }
    .log-line.err { color: var(--error); }
    .log-line.warn { color: var(--secondary); }

    /* ==================== Modal ==================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface-high);
      border: 1px solid rgba(0,242,255,0.2);
      border-radius: var(--r);
      padding: 28px 32px;
      min-width: 360px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }
    .modal h3 { margin-bottom: 10px; font-size: 18px; font-weight: 700; }
    .modal p { font-size: 13px; color: var(--on-surface-var); line-height: 1.8; }
    .modal .actions { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }

    /* ---- Custom Confirm Modal ---- */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 250;
    }
    .confirm-overlay.show { display: flex; }
    .confirm-modal {
      background: var(--surface-high);
      border: 1px solid rgba(0,242,255,0.2);
      border-radius: var(--r);
      padding: 28px 32px;
      min-width: 360px;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }
    .confirm-modal .confirm-msg {
      font-size: 14px;
      color: var(--on-surface);
      line-height: 1.7;
      margin-bottom: 20px;
      white-space: pre-line;
    }
    .confirm-modal .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .confirm-modal .btn-confirm-yes {
      padding: 8px 28px;
      border-radius: var(--r);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: var(--error);
      color: #fff;
      font-family: inherit;
      transition: all 0.2s;
    }
    .confirm-modal .btn-confirm-yes:hover { filter: brightness(1.15); }
    .confirm-modal .btn-confirm-no {
      padding: 8px 28px;
      border-radius: var(--r);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      color: var(--on-surface-var);
      font-family: inherit;
      transition: all 0.2s;
    }
    .confirm-modal .btn-confirm-no:hover { background: rgba(255,255,255,0.1); color: var(--on-surface); }

    /* ==================== Loading ==================== */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 300;
      transition: opacity 0.4s;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p {
      margin-top: 14px;
      color: var(--on-surface-var);
      font-size: 12px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Custom Titlebar -->
  <div class="titlebar">
    <span class="titlebar-title">TX 游戏活动助手</span>
    <div class="titlebar-btns">
      <button class="tb-btn" onclick="winMinimize()" title="最小化">
        <span class="mi">remove</span>
      </button>
      <button class="tb-btn" onclick="winMaximize()" title="最大化">
        <span class="mi">crop_square</span>
      </button>
      <button class="tb-btn close" onclick="winClose()" title="关闭">
        <span class="mi">close</span>
      </button>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="header-left">
      <span class="header-title">控制中心</span>
      <span class="header-badge">TX Helper v1.0</span>
      <span class="header-status" id="header-status">待命</span>
    </div>
    <div class="header-right">
      <button class="btn btn-ghost" id="btn-login" onclick="doLogin()">
        <span class="mi" style="font-size:15px">login</span> QQ登录
      </button>
      <button class="btn btn-ghost" id="btn-logout" onclick="clearLogin()">
        <span class="mi" style="font-size:15px">logout</span> 清空登录
      </button>
      <button class="btn btn-ghost" onclick="addEvent()">
        <span class="mi" style="font-size:15px">add_circle</span> 添加活动
      </button>
      <button class="btn btn-ghost" onclick="openEventsDir()">
        <span class="mi" style="font-size:15px">folder_open</span> 活动目录
      </button>
      <button class="btn btn-cyan btn-lg" id="btn-run-all" onclick="runAll()">
        <span class="mi" style="font-size:18px">bolt</span> 一键运行
      </button>
    </div>
  </header>

  <!-- Event Cards -->
  <div id="events"></div>

  <!-- Log Panel -->
  <div id="log-panel" class="expanded">
    <div class="log-header" onclick="toggleLog()">
      <div class="log-dot" id="log-indicator"></div>
      <span class="log-label">运行日志</span>
      <div class="log-sep"></div>
      <span class="log-meta" id="log-uptime">就绪</span>
      <div class="log-spacer"></div>
      <button class="log-link danger" onclick="clearLog(event)">清空</button>
      <span class="log-toggle" id="log-toggle">&#9660;</span>
    </div>
    <div class="log-body" id="log-body"></div>
  </div>

  <!-- Login Modal -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal">
      <h3>QQ 扫码登录</h3>
      <p>已打开浏览器窗口，请在其中完成 QQ 扫码登录。<br>登录成功后窗口将自动关闭。</p>
    </div>
  </div>

  <!-- Custom Confirm Modal -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-modal">
      <div class="confirm-msg" id="confirm-msg"></div>
      <div class="actions">
        <button class="btn-confirm-yes" id="confirm-yes">确定</button>
        <button class="btn-confirm-no" id="confirm-no">取消</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <p>正在初始化引擎...</p>
  </div>

  <script>
    var ipcRenderer = require('electron').ipcRenderer;
    var shell = require('electron').shell;

    // ==================== State ====================
    var isRunning = false;
    var events = [];

    // ==================== Window Controls ====================
    function winMinimize() { ipcRenderer.invoke('window-minimize'); }
    function winMaximize() { ipcRenderer.invoke('window-maximize'); }
    function winClose()    { ipcRenderer.invoke('window-close'); }

    // ==================== Init ====================
    window.addEventListener('DOMContentLoaded', function() {
      ipcRenderer.on('engine-ready', function(_e, info) {
        if (info.error) addLog('引擎加载失败: ' + info.error, 'err');
        refreshEvents();
        checkLogin();
      });
      ipcRenderer.on('bot-log', function(_e, msg) { addLog(msg); });
      ipcRenderer.invoke('renderer-ready');
    });

    // ==================== Login Status ====================
    function checkLogin() {
      var frameworks = [];
      var seen = {};
      for (var i = 0; i < events.length; i++) {
        var fw = events[i].framework === 'milo' || events[i].type === 'checkin' ? 'milo' : 'act';
        if (!seen[fw]) { seen[fw] = true; frameworks.push(fw); }
      }
      if (frameworks.length === 0) frameworks = ['act', 'milo'];

      ipcRenderer.invoke('check-all-logins', frameworks).then(function(res) {
        var statusEl = document.getElementById('header-status');
        var dotEl = document.getElementById('log-indicator');
        var loggedInAny = false;
        var parts = [];
        for (var k in res) {
          if (res[k]) { loggedInAny = true; parts.push(k === 'milo' ? 'Milo' : 'ACT'); }
        }
        if (loggedInAny) {
          statusEl.textContent = '已连接 · ' + parts.join('/');
          statusEl.style.color = 'var(--primary)';
          dotEl.style.background = 'var(--primary)';
          dotEl.style.boxShadow = '0 0 6px var(--primary)';
        } else {
          statusEl.textContent = '未登录';
          statusEl.style.color = 'var(--error)';
          dotEl.style.background = 'var(--error)';
          dotEl.style.boxShadow = '0 0 6px var(--error)';
        }
      });
    }

    // ==================== Events ====================
    function refreshEvents() {
      ipcRenderer.invoke('list-events').then(function(list) {
        events = list;
        renderEvents();
      }).catch(function(err) {
        addLog('加载活动列表失败: ' + err.message, 'err');
      }).then(function() {
        hideLoading();
      });
    }

    function renderEvents() {
      var box = document.getElementById('events');
      var countEl = document.getElementById('log-uptime');
      var activeCount = 0;
      for (var i = 0; i < events.length; i++) {
        if (events[i]._active) activeCount++;
      }
      countEl.textContent = '模块: ' + activeCount + '/' + events.length + ' 活跃';

      if (events.length === 0) {
        box.innerHTML =
          '<div class="empty">' +
            '<div class="icon">📭</div>' +
            '<p>暂无活动配置</p>' +
            '<p style="font-size:12px;margin-top:4px;opacity:0.5">点击上方「添加活动」导入 JSON 配置文件</p>' +
          '</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < events.length; i++) {
        var evt = events[i];
        var dCount = (evt.dailyTasks || []).length;
        var wCount = (evt.weeklyTasks || []).length;
        var oCount = (evt.oneTimeTasks || []).length;
        var dPts = taskPoints(evt.dailyTasks);
        var wPts = taskPoints(evt.weeklyTasks);
        var oPts = taskPoints(evt.oneTimeTasks);
        var reward = rewardText(evt.targetReward);
        var isActive = evt._active;
        var disabled = !isActive || isRunning;

        var dotClass = isActive ? 'active' : 'expired';
        var statusText = isActive ? '进行中' : '已过期';
        var labelClass = isActive ? 'active' : '';

        var subtitle = evt.type === 'checkin' ? '打卡签到' : (dCount > 0 ? '每日任务' : '限时活动');

        var infoLabel, infoContent;
        if (evt.type === 'checkin') {
          var msArr = evt.milestones || [];
          var msStr = '';
          for (var j = 0; j < msArr.length; j++) {
            if (j > 0) msStr += ' / ';
            msStr += msArr[j].days + '天';
          }
          infoLabel = '打卡进度';
          infoContent = evt._checkInDays !== undefined
            ? '已打卡 ' + evt._checkInDays + ' 天 · 里程碑: ' + msStr
            : '里程碑: ' + msStr;
        } else {
          infoLabel = reward ? '目标奖励' : '活动信息';
          var lines = [];
          if (reward) lines.push(esc(reward));
          if (dCount > 0) lines.push('每日任务 ' + dCount + ' 个 (' + dPts + '分/天)');
          if (wCount > 0) lines.push('每周任务 ' + wCount + ' 个 (' + wPts + '分/周)');
          if (oCount > 0) lines.push('一次性任务 ' + oCount + ' 个 (' + oPts + '分)');
          infoContent = lines.join('<br>');
        }

        var progressPct;
        if (evt.type === 'checkin') {
          var maxDays = 1;
          var milestones = evt.milestones || [];
          for (var j = 0; j < milestones.length; j++) {
            if (milestones[j].days > maxDays) maxDays = milestones[j].days;
          }
          var days = evt._checkInDays || 0;
          progressPct = Math.min(100, Math.round((days / maxDays) * 100));
        } else {
          progressPct = isActive ? 100 : 0;
        }

        var btnRunClass = isActive ? 'card-btn-run' : 'card-btn-retry';
        var btnRunLabel = isActive ? '运行' : '重新运行';

        html += '<div class="glass-card ' + (isActive ? '' : 'expired') + '">' +
          '<div class="card-inner">' +
            '<div class="card-top">' +
              '<span class="card-title">' + esc(evt.name) + '</span>' +
              '<div class="status-badge">' +
                '<span class="status-dot ' + dotClass + '"></span>' +
                '<span class="status-label ' + labelClass + '">' + statusText + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="card-date">' + esc(evt.startDate) + ' 至 ' + esc(evt.endDate) + '</div>' +
            '<div class="card-subtitle">' + esc(subtitle) + '</div>' +
            '<div class="info-box">' +
              '<div class="info-box-label">' + esc(infoLabel) + '</div>' +
              '<div class="info-box-content">' + infoContent + '</div>' +
            '</div>' +
            '<div class="card-actions">' +
              '<button class="card-btn ' + btnRunClass + '" onclick="runSingle(\'' + esc(evt.id) + '\')" ' + (disabled ? 'disabled' : '') + '>' +
                '<span class="mi">play_arrow</span> ' + btnRunLabel +
              '</button>' +
              '<button class="card-btn card-btn-sm" onclick="openUrl(\'' + esc(evt.id) + '\')" ' + (!evt.url ? 'disabled' : '') + ' title="打开活动页面">' +
                '<span class="mi">open_in_new</span>' +
              '</button>' +
              '<button class="card-btn card-btn-sm" onclick="queryStatus(\'' + esc(evt.id) + '\')" ' + (disabled ? 'disabled' : '') + ' title="查询' + (evt.type === 'checkin' ? '天数' : '积分') + '">' +
                '<span class="mi">query_stats</span>' +
              '</button>' +
              '<button class="card-btn card-btn-sm danger" onclick="removeEvent(\'' + esc(evt.id) + '\')" ' + (isRunning ? 'disabled' : '') + ' title="删除活动">' +
                '<span class="mi">delete_outline</span>' +
              '</button>' +
            '</div>' +
          '</div>' +
          '<div class="progress-track">' +
            '<div class="progress-fill ' + (isActive ? '' : 'dim') + '" style="width:' + progressPct + '%"></div>' +
          '</div>' +
        '</div>';
      }
      box.innerHTML = html;
    }

    // ==================== Actions ====================
    function runSingle(eventId) {
      setRunning(true);
      addLog('════════ 开始运行 ════════');
      ipcRenderer.invoke('run-event', eventId).then(function(res) {
        showRunResult(res);
        if (res.result && res.result.checkInDays !== undefined) {
          for (var i = 0; i < events.length; i++) {
            if (events[i].id === eventId) {
              events[i]._checkInDays = res.result.checkInDays;
              break;
            }
          }
          renderEvents();
        }
        addLog('════════ 运行结束 ════════');
        setRunning(false);
      });
    }

    function runAll() {
      setRunning(true);
      addLog('════════ 一键运行全部活动 ════════');
      ipcRenderer.invoke('run-all').then(function(res) {
        if (res.error) {
          addLog('错误: ' + res.error, 'err');
        } else if (res.results) {
          for (var id in res.results) {
            showRunResult({ result: res.results[id] });
          }
        }
        addLog('════════ 全部完成 ════════');
        setRunning(false);
      });
    }

    function showRunResult(res) {
      if (res.error) { addLog('执行失败: ' + res.error, 'err'); return; }
      var r = res.result;
      if (!r) { addLog('未获取到执行结果', 'warn'); return; }
      if (r.error) addLog('执行出错: ' + r.error, 'err');
      if (r.daily) addLog('  每日任务: 成功' + r.daily.success + ' 跳过' + r.daily.skip + ' 失败' + r.daily.fail, r.daily.fail > 0 ? 'warn' : 'ok');
      if (r.weekly) addLog('  每周任务: 成功' + r.weekly.success + ' 跳过' + r.weekly.skip + ' 失败' + r.weekly.fail, r.weekly.fail > 0 ? 'warn' : 'ok');
      if (r.oneTime) addLog('  一次性任务: 成功' + r.oneTime.success + ' 跳过' + r.oneTime.skip + ' 失败' + r.oneTime.fail, r.oneTime.fail > 0 ? 'warn' : 'ok');
      if (r.score !== undefined) addLog('  当前积分: ' + r.score, 'ok');
      if (r.exchanged) addLog('  奖励已兑换!', 'ok');
      if (r.checkInDays !== undefined && !r.error) addLog('  打卡天数: ' + r.checkInDays, 'ok');
      if (r.claimed && r.claimed.length > 0) {
        addLog('  本次领取: ' + r.claimed.length + ' 个里程碑奖励', 'ok');
        for (var i = 0; i < r.claimed.length; i++) addLog('    - ' + r.claimed[i].name, 'ok');
      } else if (r.claimed && r.claimed.length === 0 && !r.error) {
        addLog('  无可领取的里程碑奖励', 'warn');
      }
    }

    function doLogin() {
      if (events.length === 0) { addLog('请先添加一个活动配置', 'warn'); return; }
      var active = [];
      for (var i = 0; i < events.length; i++) {
        if (events[i]._active) active.push(events[i]);
      }
      var all = active.length > 0 ? active : events;
      var frameworkGroups = {};
      for (var i = 0; i < all.length; i++) {
        var evt = all[i];
        var fw = evt.framework === 'milo' || evt.type === 'checkin' ? 'milo' : 'act';
        if (!frameworkGroups[fw]) frameworkGroups[fw] = [];
        frameworkGroups[fw].push(evt.url);
      }
      showLoginModal();
      var hasError = false;
      var keys = Object.keys(frameworkGroups);
      var idx = 0;

      function loginNext() {
        if (idx >= keys.length) {
          closeLoginModal();
          if (!hasError) addLog('所有框架登录状态已保存', 'ok');
          checkLogin();
          return;
        }
        var fw = keys[idx++];
        var urls = frameworkGroups[fw];
        var fwLabel = fw === 'milo' ? 'Milo' : 'ACT';
        addLog('正在为 ' + fwLabel + ' 框架打开浏览器登录...');
        ipcRenderer.invoke('login', urls[0], urls.slice(1), fw).then(function(res) {
          if (res.error) { addLog(fwLabel + ' 登录失败: ' + res.error, 'err'); hasError = true; }
          else addLog(fwLabel + ' 登录成功!', 'ok');
          loginNext();
        });
      }
      loginNext();
    }

    function customConfirm(msg) {
      return new Promise(function(resolve) {
        var overlay = document.getElementById('confirm-overlay');
        var msgEl = document.getElementById('confirm-msg');
        var yesBtn = document.getElementById('confirm-yes');
        var noBtn = document.getElementById('confirm-no');
        msgEl.textContent = msg;
        overlay.classList.add('show');
        function cleanup() {
          overlay.classList.remove('show');
          overlay.removeEventListener('click', onOverlay);
          yesBtn.removeEventListener('click', onYes);
          noBtn.removeEventListener('click', onNo);
        }
        function onYes() { cleanup(); resolve(true); }
        function onNo() { cleanup(); resolve(false); }
        function onOverlay(e) { if (e.target === overlay) { cleanup(); resolve(false); } }
        overlay.addEventListener('click', onOverlay);
        yesBtn.addEventListener('click', onYes);
        noBtn.addEventListener('click', onNo);
      });
    }

    function clearLogin() {
      customConfirm('确定要清空所有登录信息吗？\n（将删除 Cookie 和浏览器缓存，需要重新登录）').then(function(ok) {
        if (!ok) return;
        ipcRenderer.invoke('clear-login').then(function(res) {
          if (res.error) addLog('清空失败: ' + res.error, 'err');
          else addLog('登录信息已清空', 'ok');
          checkLogin();
        });
      });
    }

    function queryStatus(eventId) {
      setRunning(true);
      var evt = null;
      for (var i = 0; i < events.length; i++) {
        if (events[i].id === eventId) { evt = events[i]; break; }
      }
      var isCheckIn = evt && evt.type === 'checkin';
      addLog('── 查询 ' + (evt ? evt.name : eventId) + ' ' + (isCheckIn ? '打卡天数' : '积分') + ' ──');
      ipcRenderer.invoke('status', eventId).then(function(res) {
        if (res.error) {
          addLog('查询失败: ' + res.error, 'err');
        } else if (res.result) {
          var r = res.result;
          if (r.error) addLog('查询异常: ' + r.error, 'err');
          else if (r.loggedIn === false) addLog('未登录，请先点击 QQ登录', 'warn');
          else if (isCheckIn && r.checkInDays !== undefined) {
            addLog('当前打卡天数: ' + r.checkInDays, 'ok');
            evt._checkInDays = r.checkInDays;
            renderEvents();
          } else if (r.score !== undefined) {
            addLog('当前积分: ' + r.score, 'ok');
            if (r.predictionScore !== undefined) addLog('预测积分: ' + r.predictionScore, 'ok');
            if (r.target) {
              var diff = Math.max(0, r.target.cost - r.score);
              addLog('目标 ' + r.target.name + '(' + r.target.cost + '分) ' + (diff > 0 ? '还差 ' + diff + ' 分' : '已达成!'), diff > 0 ? 'warn' : 'ok');
            }
          }
        }
        setRunning(false);
      });
    }

    function addEvent() {
      ipcRenderer.invoke('add-event').then(function(res) {
        if (res.canceled) return;
        if (res.error) { addLog(res.error, 'err'); return; }
        addLog('已添加活动: ' + res.event.name, 'ok');
        refreshEvents();
      });
    }

    function removeEvent(eventId) {
      var evt = null;
      for (var i = 0; i < events.length; i++) {
        if (events[i].id === eventId) { evt = events[i]; break; }
      }
      if (!evt) return;
      customConfirm('确定删除活动 "' + evt.name + '" ?').then(function(ok) {
        if (!ok) return;
        ipcRenderer.invoke('remove-event', eventId).then(function(res) {
          if (res.error) addLog('删除失败: ' + res.error, 'err');
          else { addLog('已删除: ' + evt.name, 'ok'); refreshEvents(); }
        });
      });
    }

    function openEventsDir() { ipcRenderer.invoke('open-events-dir'); }

    function openUrl(eventId) {
      for (var i = 0; i < events.length; i++) {
        if (events[i].id === eventId && events[i].url) {
          shell.openExternal(events[i].url);
          return;
        }
      }
    }

    // ==================== UI Helpers ====================
    function setRunning(val) {
      isRunning = val;
      document.getElementById('btn-run-all').disabled = val;
      document.getElementById('btn-login').disabled = val;
      document.getElementById('btn-logout').disabled = val;
      var statusEl = document.getElementById('header-status');
      if (val) {
        statusEl.textContent = '执行中...';
        statusEl.style.color = 'var(--secondary)';
      }
      renderEvents();
    }

    function hideLoading() {
      var el = document.getElementById('loading');
      if (!el) return;
      el.classList.add('hide');
      setTimeout(function() { el.remove(); }, 400);
    }

    function showLoginModal() { document.getElementById('login-modal').classList.add('show'); }
    function closeLoginModal() { document.getElementById('login-modal').classList.remove('show'); }

    function toggleLog() {
      var panel = document.getElementById('log-panel');
      var toggle = document.getElementById('log-toggle');
      panel.classList.toggle('expanded');
      toggle.innerHTML = panel.classList.contains('expanded') ? '&#9660;' : '&#9650;';
    }

    // ==================== Log ====================
    function addLog(msg, cls) {
      var body = document.getElementById('log-body');
      var line = document.createElement('div');
      line.className = 'log-line';
      if (cls) {
        line.classList.add(cls);
      } else {
        var m = msg.toLowerCase();
        if (m.indexOf('成功') >= 0 || m.indexOf('✓') >= 0 || m.indexOf('已保存') >= 0 || m.indexOf('完成') >= 0) line.classList.add('ok');
        else if (m.indexOf('失败') >= 0 || m.indexOf('错误') >= 0 || m.indexOf('异常') >= 0 || m.indexOf('失效') >= 0) line.classList.add('err');
        else if (m.indexOf('等待') >= 0 || m.indexOf('超时') >= 0 || m.indexOf('不足') >= 0 || m.indexOf('跳过') >= 0) line.classList.add('warn');
      }
      var time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      line.textContent = '[' + time + '] ' + msg;
      body.appendChild(line);
      body.scrollTop = body.scrollHeight;
      var panel = document.getElementById('log-panel');
      if (!panel.classList.contains('expanded')) {
        panel.classList.add('expanded');
        document.getElementById('log-toggle').innerHTML = '&#9660;';
      }
    }

    function clearLog(e) {
      e.stopPropagation();
      document.getElementById('log-body').innerHTML = '';
    }

    // ==================== Util ====================
    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function rewardText(r) {
      if (!r) return '';
      if (typeof r === 'string') return r;
      return r.name || r.id || JSON.stringify(r);
    }
    function taskPoints(tasks) {
      var s = 0;
      for (var i = 0; i < (tasks || []).length; i++) s += (tasks[i].points || 0);
      return s;
    }
  </script>
</body>
</html>
